spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartshop?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:YOUR_DEEPSEEK_API_KEY}
      model-name: deepseek-chat
      strict-tools: false
      temperature: 0.0
      timeout: PT60S
      log-requests: false
      log-responses: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    dev.langchain4j: DEBUG
